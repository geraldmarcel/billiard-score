<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Pro Tracker V9.7</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b;
    --border: #d2d2d7; --primary: #0071e3; --accent: #f5f5f7;
    --win: #0071e3; --lose: #ff3b30;
  }
  [data-theme="dark"] {
    --bg: #000000; --card: #1c1c1e; --text: #f5f5f7; --sub: #a1a1a6;
    --border: #38383a; --primary: #0a84ff; --accent: #2c2c2e;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
  .container { max-width: 800px; margin: 0 auto; }
  
  .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn { text-decoration: none; color: var(--sub); font-size: 13px; font-weight: 600; }
  .mode-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600; }

  /* Input Cards */
  .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); position: relative; }
  .input-group { display: flex; flex-direction: column; position: relative; margin-bottom: 12px; }
  
  /* Compact Date Style */
  .date-wrap { width: 150px; } 
  
  label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--sub); margin-bottom: 5px; letter-spacing: 0.5px; }
  input, select { background: var(--accent); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }
  
  /* Buttons Layout */
  .btn-container { display: flex; gap: 10px; margin-top: 15px; flex-direction: row-reverse; } /* Swap position visually */
  .save-btn { flex: 3; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px; }
  .reset-btn { flex: 1; padding: 15px; background: var(--accent); color: var(--sub); border: 1px solid var(--border); border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 13px; }
  
  /* Player UI */
  .player-header { display: flex; gap: 10px; margin-bottom: 5px; }
  .player-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .p-name-wrap { flex: 1; position: relative; }
  .p-score-wrap { width: 70px; }
  .p-score { text-align: center; font-weight: 800; color: var(--primary); }

  /* Autocomplete */
  .ac-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; z-index: 9999; display: none; max-height: 150px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .ac-item { padding: 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
  .ac-item:hover { background: var(--primary); color: white; }

  /* Chips & Filter */
  .multi-select-box { background: var(--accent); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; font-weight: 700; background: var(--card); color: var(--sub); }
  .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Analytics Display */
  .chart-container { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 10px; margin-top: 10px; height: 220px; display: flex; justify-content: center; align-items: center; }
  .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 450px; }
  th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: var(--accent); color: var(--sub); font-size: 9px; font-weight: 800; text-transform: uppercase; }
  
  .tag { padding: 4px 8px; border-radius: 6px; color: #fff; font-size: 10px; font-weight: 800; margin: 1px; display: inline-block; }
  .blue { background: var(--win); } .red { background: var(--lose); }

  .action-btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
  .edit { background: #e1f0ff; color: var(--primary); }
  .delete { background: #ffebeb; color: #ff3b30; }

  .collapsed { display: none !important; }
  .section-title { font-size: 14px; font-weight: 800; margin: 25px 0 12px; display: flex; justify-content: space-between; cursor: pointer; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
  .bar-row { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 700; }
  .bar-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <a href="index.html" class="back-btn">← Back to Home</a>
    <button class="mode-btn" onclick="toggleTheme()">🌓 Theme</button>
  </div>

  <div class="card">
    <div style="font-weight: 800; font-size: 15px; margin-bottom: 15px;">📝 Match Record</div>
    
    <div class="input-group date-wrap">
      <label>Match Date</label>
      <input type="date" id="date">
    </div>

    <div style="display:flex; gap:10px;">
      <div class="input-group" style="flex:2;"><label>Location</label><input type="text" id="loc" placeholder="Club..." autocomplete="off"><div id="res-loc" class="ac-box"></div></div>
      <div class="input-group" style="flex:1;"><label>Table</label><input type="text" id="table" placeholder="No..." autocomplete="off"><div id="res-table" class="ac-box"></div></div>
    </div>
    
    <div class="player-header">
      <label style="flex:1;">Player Name</label>
      <label style="width:70px; text-align:center;">Score</label>
    </div>
    <div id="playerInputs"></div>
    <button style="background:none; border: 1px dashed var(--sub); color: var(--sub); padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin: 10px 0; font-size: 12px;" onclick="window.addPlayerField()">+ Add Player</button>
    
    <div class="btn-container">
      <button class="reset-btn" onclick="window.resetForm()">Reset</button>
      <button class="save-btn" id="btnSave" onclick="saveMatch()">Save Match Result</button>
    </div>
  </div>

  <div class="card">
    <div style="font-weight: 800; font-size: 15px; margin-bottom: 10px;">🔎 Dashboard Filter</div>
    <label>Players Filter:</label>
    <div id="multiPlayerFilter" class="multi-select-box"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <select id="filterMonth" onchange="render()"><option value="all">All Months</option>
        <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
      </select>
      <select id="filterYear" onchange="render()"><option value="all">All Years</option></select>
    </div>
  </div>

  <div class="section-title" onclick="toggleMainSection('h2hSection')">🏆 H2H Analysis <span>▼</span></div>
  <div id="h2hSection">
    <div class="table-wrapper">
      <table><thead><tr><th>Matchup</th><th>Points</th></tr></thead><tbody id="leaderboardBody"></tbody></table>
    </div>
    <div class="chart-container"><canvas id="leaderboardChart"></canvas></div>
  </div>

  <div class="section-title" onclick="toggleMainSection('tableStats')">📊 Table Stats <span>▼</span></div>
  <div id="tableStats" class="collapsed" style="padding:15px; background:var(--card); border: 1px solid var(--border); border-radius:12px;"></div>

  <div class="section-title" onclick="toggleMainSection('locStats')">📍 Venue Stats <span>▼</span></div>
  <div id="locStats" class="collapsed" style="padding:15px; background:var(--card); border: 1px solid var(--border); border-radius:12px;"></div>

  <div style="font-size: 14px; font-weight: 800; margin: 25px 0 12px; color: var(--sub);">📜 Match History</div>
  <div class="table-wrapper">
    <table><thead><tr><th>Date</th><th>Result</th><th>Loc</th><th>Tab</th><th>Act</th></tr></thead><tbody id="historyBody"></tbody></table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtlTm-HxYxa4f_Ypf-b-cs7zCnqWb5Tq4",
  authDomain: "billiard-2b803.firebaseapp.com",
  databaseURL: "https://billiard-2b803-default-rtdb.firebaseio.com",
  projectId: "billiard-2b803",
  storageBucket: "billiard-2b803.firebasestorage.app",
  messagingSenderId: "444434542940",
  appId: "1:444434542940:web:74b12f78ea71bd54f3d199"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'billiard_final_v8';

let allData = {}, masterP = [], masterL = [], masterT = [], selectedPlayers = [];
let editingId = null, myChart = null;

const userColors = ["#0071e3", "#34c759", "#ff9500", "#af52de", "#ff3b30", "#5856d6", "#ff2d55", "#00c7be"];
function getPColor(p) { return userColors[masterP.indexOf(p) % userColors.length]; }

function initAC(inpId, boxId, list) {
    const inp = document.getElementById(inpId), box = document.getElementById(boxId);
    if(!inp || !box) return;
    inp.oninput = () => {
        const v = inp.value.toLowerCase().trim(); box.innerHTML = "";
        if(!v) { box.style.display="none"; return; }
        list.filter(x => x.toLowerCase().includes(v)).forEach(i => {
            const d = document.createElement('div'); d.className="ac-item"; d.innerText=i;
            d.onclick=()=>{ inp.value=i; box.style.display="none"; }; box.appendChild(d);
        });
        box.style.display = box.children.length ? "block":"none";
    };
}

window.addPlayerField = (n="", s="") => {
    const cont = document.getElementById('playerInputs');
    const div = document.createElement('div'); div.className = 'player-row';
    div.innerHTML = `<div class="p-name-wrap"><input type="text" class="p-name" placeholder="Name..." value="${n}" autocomplete="off"><div class="ac-box"></div></div>
        <div class="p-score-wrap"><input type="number" class="p-score" value="${s}" placeholder="0"></div>`;
    cont.appendChild(div);
    const inp = div.querySelector('.p-name'), box = div.querySelector('.ac-box');
    inp.oninput = () => {
        const v = inp.value.toLowerCase().trim(); box.innerHTML = "";
        if(!v) { box.style.display="none"; return; }
        masterP.filter(x => x.toLowerCase().includes(v)).forEach(p => {
            const d = document.createElement('div'); d.className="ac-item"; d.innerText=p;
            d.onclick=()=>{ inp.value=p; box.style.display="none"; }; box.appendChild(d);
        });
        box.style.display = box.children.length ? "block":"none";
    };
};

window.resetForm = () => {
    editingId = null;
    document.getElementById('btnSave').innerText = "Save Match Result";
    document.getElementById('loc').value = "";
    document.getElementById('table').value = "";
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('playerInputs').innerHTML = "";
    addPlayerField(); addPlayerField();
};

onValue(ref(db, DB_PATH), snap => {
    allData = snap.val() || {};
    let pSet = new Set(), lSet = new Set(), tSet = new Set(), ySet = new Set();
    Object.keys(allData).forEach(date => {
        ySet.add(date.split('-')[0]);
        Object.values(allData[date]).forEach(m => {
            if(m.location && m.location !== "-") lSet.add(m.location);
            if(m.table && m.table !== "-") tSet.add(m.table);
            if(m.players) m.players.forEach(p => pSet.add(p.name));
        });
    });
    masterP = [...pSet].sort(); masterL = [...lSet].sort(); masterT = [...tSet].sort();
    const fy = document.getElementById('filterYear');
    fy.innerHTML = '<option value="all">All Years</option>';
    [...ySet].sort().reverse().forEach(y => fy.innerHTML += `<option value="${y}">${y}</option>`);
    initAC('loc', 'res-loc', masterL); initAC('table', 'res-table', masterT);
    render();
});

window.saveMatch = () => {
    const d = document.getElementById('date').value, l = document.getElementById('loc').value.trim() || "-", t = document.getElementById('table').value.trim() || "-";
    const ns = document.querySelectorAll('.p-name'), scs = document.querySelectorAll('.p-score');
    let ps = []; ns.forEach((el, i) => { if(el.value.trim()) ps.push({ name: el.value.trim(), score: parseInt(scs[i].value) || 0 }); });
    if(ps.length < 2 || !d) return alert("Data incomplete!");
    const path = editingId ? `${DB_PATH}/${d}/${editingId}` : `${DB_PATH}/${d}`;
    const act = editingId ? set(ref(db, path), { players:ps, location:l, table:t, timestamp:Date.now() }) : push(ref(db, path), { players:ps, location:l, table:t, timestamp:Date.now() });
    act.then(() => window.resetForm()).catch(e => alert("Error: " + e.message));
};

window.render = () => {
    const hBody = document.getElementById('historyBody'), lBody = document.getElementById('leaderboardBody'), chips = document.getElementById('multiPlayerFilter');
    hBody.innerHTML = ""; lBody.innerHTML = ""; chips.innerHTML = "";
    const fM = document.getElementById('filterMonth').value, fY = document.getElementById('filterYear').value;
    let h2h = {}, chartData = {}, tStats = {}, lStats = {};
    
    masterP.forEach(p => {
        const c = document.createElement('div'); c.className = `chip ${selectedPlayers.includes(p) ? 'active' : ''}`;
        c.innerText = p; c.onclick = () => { if(selectedPlayers.includes(p)) selectedPlayers = selectedPlayers.filter(x => x !== p); else selectedPlayers.push(p); render(); };
        chips.appendChild(c);
    });

    Object.keys(allData).sort().reverse().forEach(date => {
        const [y, m_str] = date.split('-');
        const isTimeMatch = (fM === 'all' || m_str === fM) && (fY === 'all' || y === fY);
        Object.keys(allData[date]).forEach(mid => {
            const m = allData[date][mid], pNames = m.players.map(p => p.name), hi = Math.max(...m.players.map(p => p.score));
            if(isTimeMatch) {
                const tr = document.createElement('tr');
                let res = m.players.map(p => `<span class="tag ${p.score==hi?'blue':'red'}">${p.name.split(' ')[0]}:${p.score}</span>`).join("");
                tr.innerHTML = `<td>${date.slice(5)}</td><td>${res}</td><td>${m.location}</td><td>${m.table}</td>
                    <td><button class="action-btn edit" onclick="window.editMatch('${date}','${mid}')">✎</button></td>`;
                hBody.appendChild(tr);
                m.players.forEach(p => {
                    const win = (p.score === hi && hi > 0);
                    [[m.table, tStats], [m.location, lStats]].forEach(([key, obj]) => {
                        if(!key || key === "-") return;
                        if(!obj[key]) obj[key] = {}; if(!obj[key][p.name]) obj[key][p.name] = {w:0, t:0};
                        obj[key][p.name].t++; if(win) obj[key][p.name].w++;
                    });
                });
                if(selectedPlayers.length === 0 || selectedPlayers.every(n => pNames.includes(n))) {
                    m.players.forEach((p1, i) => {
                        if(selectedPlayers.length === 0 || selectedPlayers.includes(p1.name)) chartData[p1.name] = (chartData[p1.name] || 0) + p1.score;
                        for(let j=i+1; j<m.players.length; j++) {
                            const p2 = m.players[j];
                            if(selectedPlayers.length > 1 && (!selectedPlayers.includes(p1.name) || !selectedPlayers.includes(p2.name))) continue;
                            const key = [p1.name, p2.name].sort().join(" VS ");
                            if(!h2h[key]) h2h[key] = {};
                            h2h[key][p1.name] = (h2h[key][p1.name] || 0) + p1.score;
                            h2h[key][p2.name] = (h2h[key][p2.name] || 0) + p2.score;
                        }
                    });
                }
            }
        });
    });
    Object.keys(h2h).sort().forEach(k => {
        const n = k.split(" VS "), s1 = h2h[k][n[0]], s2 = h2h[k][n[1]];
        lBody.innerHTML += `<tr><td style="font-weight:700;">${k}</td><td><span class="tag ${s1>=s2?'blue':'red'}">${n[0]}:${s1}</span> <span class="tag ${s2>=s1?'blue':'red'}">${n[1]}:${s2}</span></td></tr>`;
    });
    updateChart(chartData);
    renderStats('tableStats', tStats); renderStats('locStats', lStats);
};

function updateChart(data) {
    const ctx = document.getElementById('leaderboardChart');
    const labs = Object.keys(data).sort((a,b) => data[b] - data[a]);
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labs, datasets: [{ data: labs.map(l => data[l]), backgroundColor: labs.map(l => getPColor(l)), borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: true, aspectRatio: 2, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
    });
}

function renderStats(id, stats) {
    const cont = document.getElementById(id); cont.innerHTML = "";
    Object.keys(stats).sort().forEach(v => {
        const card = document.createElement('div'); card.style.marginBottom = "20px";
        card.innerHTML = `<div style="font-weight:800; font-size:11px; margin-bottom:8px; color:var(--sub)">${v.toUpperCase()}</div>`;
        Object.keys(stats[v]).sort((a,b) => (stats[v][b].w/stats[v][b].t) - (stats[v][a].w/stats[v][a].t)).forEach(p => {
            const d = stats[v][p], wr = Math.round((d.w/d.t)*100);
            card.innerHTML += `<div class="bar-row"><div class="bar-label"><span>${p}</span><span>${wr}% (${d.w}/${d.t})</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${wr}%; background:${getPColor(p)}"></div></div></div>`;
        });
        cont.appendChild(card);
    });
}

window.toggleMainSection = (id) => document.getElementById(id).classList.toggle('collapsed');
window.editMatch = (d, mid) => {
    const m = allData[d][mid]; editingId = mid;
    document.getElementById('date').value = d; document.getElementById('loc').value = m.location;
    document.getElementById('table').value = m.table; document.getElementById('playerInputs').innerHTML = "";
    m.players.forEach(p => window.addPlayerField(p.name, p.score));
    document.getElementById('btnSave').innerText = "Update Match"; window.scrollTo({top: 0, behavior: 'smooth'});
};
window.toggleTheme = () => {
    const n = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', n); localStorage.setItem('billiard-theme', n);
};

document.getElementById('date').value = new Date().toISOString().split('T')[0];
if(localStorage.getItem('billiard-theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
addPlayerField(); addPlayerField();
document.addEventListener('click', (e) => { if(!e.target.classList.contains('p-name')) document.querySelectorAll('.ac-box').forEach(b => b.style.display='none'); });
</script>
</body>
</html>
