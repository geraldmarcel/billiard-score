<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Pro Tracker V8.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b;
    --border: #d2d2d7; --primary: #0071e3; --accent: #f5f5f7;
    --win: #0071e3; --lose: #ff3b30; --mid: #ffcc00;
  }
  [data-theme="dark"] {
    --bg: #000000; --card: #1c1c1e; --text: #f5f5f7; --sub: #a1a1a6;
    --border: #38383a; --primary: #0a84ff; --accent: #2c2c2e;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
  .container { max-width: 800px; margin: 0 auto; }
  
  .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .mode-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600; }

  .input-card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); position: relative; z-index: 100; }
  .input-group { display: flex; flex-direction: column; flex: 1; position: relative; margin-bottom: 10px; }
  label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--sub); margin-bottom: 5px; letter-spacing: 0.5px; }
  input, select { background: var(--accent); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }

  .player-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .p-name-wrap { flex: 1; position: relative; }
  .p-score-wrap { width: 60px; } 

  .ac-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; z-index: 9999; display: none; max-height: 150px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .ac-item { padding: 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
  .ac-item:hover { background: var(--primary); color: white; }

  .multi-select-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
  .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; font-weight: 700; background: var(--accent); color: var(--sub); }
  .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  .chart-container { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 15px; margin-top: 15px; height: 320px; }
  .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 450px; }
  th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: var(--accent); color: var(--sub); font-size: 9px; font-weight: 800; text-transform: uppercase; }
  
  .tag { padding: 4px 8px; border-radius: 6px; color: #fff; font-size: 10px; font-weight: 800; margin: 1px; display: inline-block; }
  .blue { background: var(--win); } .red { background: var(--lose); } .yellow { background: var(--mid); color: #000; }

  .save-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; }
  .add-player-btn { background: none; border: 1px dashed var(--sub); color: var(--sub); padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin: 10px 0; font-size: 12px; }
  
  .action-btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
  .edit { background: #e1f0ff; color: var(--primary); margin-right: 4px; }
  .delete { background: #ffebeb; color: #ff3b30; }

  .section-content { display: block; margin-bottom: 20px; }
  .collapsed { display: none !important; }
  .section-title { font-size: 15px; font-weight: 800; margin: 25px 0 12px; display: flex; justify-content: space-between; cursor: pointer; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }

  .bar-row { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 700; }
  .bar-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <div style="font-weight: 800; font-size: 20px; letter-spacing: -0.5px;">🎱 Billiard V8.9</div>
    <button class="mode-btn" onclick="toggleTheme()">🌓 Theme</button>
  </div>

  <div class="input-card">
    <div class="input-group"><label>Match Date</label><input type="date" id="date"></div>
    <div style="display:flex; gap:10px;">
      <div class="input-group">
        <label>Location</label><input type="text" id="loc" placeholder="Club Name..." autocomplete="off">
        <div id="res-loc" class="ac-box"></div>
      </div>
      <div class="input-group">
        <label>Table</label><input type="text" id="table" placeholder="Table No..." autocomplete="off">
        <div id="res-table" class="ac-box"></div>
      </div>
    </div>
    
    <label>Players & Scores</label>
    <div id="playerInputs"></div>
    <button class="add-player-btn" onclick="window.addPlayerField()">+ Add Player</button>
    <button class="save-btn" id="btnSave" onclick="saveMatch()">Save Match Result</button>
  </div>

  <div class="section-title" onclick="toggleMainSection('leaderboardSection')">🏆 H2H Analysis <span>▼</span></div>
  <div id="leaderboardSection" class="section-content">
    <label style="font-size: 9px; font-weight: 800; color: var(--sub);">FILTER PLAYERS:</label>
    <div id="multiPlayerFilter" class="multi-select-box"></div>
    
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Matchup</th><th>Accumulated Points</th></tr></thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>

    <div class="chart-container"><canvas id="leaderboardChart"></canvas></div>
  </div>

  <div class="section-title" onclick="toggleMainSection('tableStats')">📊 Table Performance <span>▼</span></div>
  <div id="tableStats" class="section-content collapsed" style="padding:10px; background:var(--card); border: 1px solid var(--border); border-radius:12px;"></div>

  <div class="section-title" onclick="toggleMainSection('locStats')">📍 Venue Stats <span>▼</span></div>
  <div id="locStats" class="section-content collapsed" style="padding:10px; background:var(--card); border: 1px solid var(--border); border-radius:12px;"></div>

  <div class="section-title">📜 Match History</div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>Date</th><th>Result</th><th>Loc</th><th>Table</th><th>Act</th></tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtlTm-HxYxa4f_Ypf-b-cs7zCnqWb5Tq4",
  authDomain: "billiard-2b803.firebaseapp.com",
  databaseURL: "https://billiard-2b803-default-rtdb.firebaseio.com",
  projectId: "billiard-2b803",
  storageBucket: "billiard-2b803.firebasestorage.app",
  messagingSenderId: "444434542940",
  appId: "1:444434542940:web:74b12f78ea71bd54f3d199",
  measurementId: "G-2ZVHSGP7K9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'billiard_final_v8';

let allData = {}, masterP = [], masterL = [], masterT = [], selectedPlayers = [];
let editingId = null, myChart = null;

// User Colors Map
const userColors = ["#0071e3", "#34c759", "#ff9500", "#af52de", "#ff3b30", "#5856d6", "#ff2d55", "#00c7be"];
function getPColor(name) {
    const idx = masterP.indexOf(name);
    return userColors[idx % userColors.length];
}

// Autocomplete
function initAC(inputId, boxId, dataList) {
    const input = document.getElementById(inputId);
    const box = document.getElementById(boxId);
    if(!input || !box) return;
    input.oninput = () => {
        const val = input.value.toLowerCase().trim();
        box.innerHTML = "";
        if(!val) { box.style.display = "none"; return; }
        dataList.filter(x => x.toLowerCase().includes(val)).forEach(item => {
            const div = document.createElement('div');
            div.className = "ac-item"; div.innerText = item;
            div.onclick = () => { input.value = item; box.style.display = "none"; };
            box.appendChild(div);
        });
        box.style.display = box.children.length ? "block" : "none";
    };
}

window.addPlayerField = (name = "", score = "") => {
    const container = document.getElementById('playerInputs');
    const div = document.createElement('div');
    div.className = 'player-row';
    div.innerHTML = `
        <div class="p-name-wrap">
            <input type="text" class="p-name" placeholder="Name" value="${name}" autocomplete="off">
            <div class="ac-box"></div>
        </div>
        <div class="p-score-wrap"><input type="number" class="p-score" value="${score}" placeholder="0" style="text-align:center; font-weight:800;"></div>
    `;
    container.appendChild(div);
    const inp = div.querySelector('.p-name'), box = div.querySelector('.ac-box');
    inp.oninput = () => {
        const val = inp.value.toLowerCase().trim();
        box.innerHTML = "";
        if(!val) { box.style.display = "none"; return; }
        masterP.filter(x => x.toLowerCase().includes(val)).forEach(p => {
            const d = document.createElement('div'); d.className = "ac-item"; d.innerText = p;
            d.onclick = () => { inp.value = p; box.style.display = "none"; };
            box.appendChild(d);
        });
        box.style.display = box.children.length ? "block" : "none";
    };
};

onValue(ref(db, DB_PATH), snap => {
    allData = snap.val() || {};
    let pSet = new Set(), lSet = new Set(), tSet = new Set();
    Object.values(allData).forEach(group => {
        Object.values(group).forEach(m => {
            if(m.location && m.location !== "-") lSet.add(m.location);
            if(m.table && m.table !== "-") tSet.add(m.table);
            if(m.players) m.players.forEach(p => pSet.add(p.name));
        });
    });
    masterP = [...pSet].sort(); masterL = [...lSet].sort(); masterT = [...tSet].sort();
    initAC('loc', 'res-loc', masterL);
    initAC('table', 'res-table', masterT);
    render();
});

window.saveMatch = () => {
    const date = document.getElementById('date').value;
    const loc = document.getElementById('loc').value.trim() || "-";
    const table = document.getElementById('table').value.trim() || "-";
    const pNames = document.querySelectorAll('.p-name'), pScores = document.querySelectorAll('.p-score');
    let players = [];
    pNames.forEach((el, i) => { if(el.value.trim()) players.push({ name: el.value.trim(), score: parseInt(pScores[i].value) || 0 }); });
    if(players.length < 2 || !date) return alert("Fill data!");
    const path = editingId ? `${DB_PATH}/${date}/${editingId}` : `${DB_PATH}/${date}`;
    const action = editingId ? set(ref(db, path), { players, location: loc, table, timestamp: Date.now() }) : push(ref(db, path), { players, location: loc, table, timestamp: Date.now() });
    action.then(() => {
        editingId = null; document.getElementById('btnSave').innerText = "Save Match Result";
        document.getElementById('playerInputs').innerHTML = ""; addPlayerField(); addPlayerField();
        document.getElementById('loc').value = ""; document.getElementById('table').value = "";
    });
};

window.render = () => {
    const hist = document.getElementById('historyBody'), lb = document.getElementById('leaderboardBody'), chips = document.getElementById('multiPlayerFilter');
    hist.innerHTML = ""; lb.innerHTML = ""; chips.innerHTML = "";
    let h2h = {}, chartData = {}, tStats = {}, lStats = {};
    
    masterP.forEach(p => {
        const c = document.createElement('div'); c.className = `chip ${selectedPlayers.includes(p) ? 'active' : ''}`;
        c.innerText = p; c.onclick = () => { 
            if(selectedPlayers.includes(p)) selectedPlayers = selectedPlayers.filter(x => x !== p);
            else selectedPlayers.push(p); render();
        };
        chips.appendChild(c);
    });

    Object.keys(allData).sort().reverse().forEach(date => {
        Object.keys(allData[date]).forEach(mid => {
            const m = allData[date][mid], pNames = m.players.map(p => p.name), high = Math.max(...m.players.map(p => p.score));
            const tr = document.createElement('tr');
            let res = m.players.map(p => `<span class="tag ${p.score==high?'blue':'red'}">${p.name.split(' ')[0]}:${p.score}</span>`).join("");
            tr.innerHTML = `<td>${date.slice(5)}</td><td>${res}</td><td>${m.location}</td><td>${m.table}</td>
                <td><button class="action-btn edit" onclick="window.editMatch('${date}','${mid}')">✎</button>
                <button class="action-btn delete" onclick="window.delMatch('${date}','${mid}')">✕</button></td>`;
            hist.appendChild(tr);

            m.players.forEach(p => {
                const win = (p.score === high && high > 0);
                [[m.table, tStats], [m.location, lStats]].forEach(([key, obj]) => {
                    if(!key || key === "-") return;
                    if(!obj[key]) obj[key] = {};
                    if(!obj[key][p.name]) obj[key][p.name] = {w:0, t:0};
                    obj[key][p.name].t++; if(win) obj[key][p.name].w++;
                });
            });

            // LOGIC: If selecting players, show only matches where ALL selected players are present
            let isRelevant = selectedPlayers.length === 0 || selectedPlayers.every(n => pNames.includes(n));

            if(isRelevant) {
                m.players.forEach((p1, i) => {
                    if(selectedPlayers.length === 0 || selectedPlayers.includes(p1.name)) {
                        chartData[p1.name] = (chartData[p1.name] || 0) + p1.score;
                    }
                    for(let j=i+1; j<m.players.length; j++){
                        const p2 = m.players[j];
                        if(selectedPlayers.length > 1 && (!selectedPlayers.includes(p1.name) || !selectedPlayers.includes(p2.name))) continue;
                        const key = [p1.name, p2.name].sort().join(" VS ");
                        if(!h2h[key]) h2h[key] = {};
                        h2h[key][p1.name] = (h2h[key][p1.name] || 0) + p1.score;
                        h2h[key][p2.name] = (h2h[key][p2.name] || 0) + p2.score;
                    }
                });
            }
        });
    });

    Object.keys(h2h).sort().forEach(k => {
        const names = k.split(" VS "), s1 = h2h[k][names[0]] || 0, s2 = h2h[k][names[1]] || 0;
        lb.innerHTML += `<tr><td style="font-weight:700;">${k}</td><td><span class="tag ${s1>=s2?'blue':'red'}">${names[0]}:${s1}</span> <span class="tag ${s2>=s1?'blue':'red'}">${names[1]}:${s2}</span></td></tr>`;
    });

    updateChart(chartData);
    renderStats('tableStats', tStats); renderStats('locStats', lStats);
};

function updateChart(dataMap) {
    const ctx = document.getElementById('leaderboardChart');
    const labels = Object.keys(dataMap).sort((a,b) => dataMap[b] - dataMap[a]);
    const values = labels.map(l => dataMap[l]);
    const colors = labels.map(l => getPColor(l));

    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ data: values, backgroundColor: colors, borderRadius: 6 }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true }, x: { grid: { display: false } } }
        }
    });
}

function renderStats(id, stats) {
    const container = document.getElementById(id); container.innerHTML = "";
    Object.keys(stats).sort().forEach(venue => {
        const card = document.createElement('div'); card.style.marginBottom = "20px";
        card.innerHTML = `<div style="font-weight:800; font-size:12px; margin-bottom:10px; color:var(--sub)">${venue.toUpperCase()}</div>`;
        Object.keys(stats[venue]).sort((a,b) => (stats[venue][b].w/stats[venue][b].t) - (stats[venue][a].w/stats[venue][a].t)).forEach(p => {
            const d = stats[venue][p], wr = Math.round((d.w/d.t)*100);
            card.innerHTML += `<div class="bar-row"><div class="bar-label"><span>${p}</span><span>${wr}% (${d.w}/${d.t})</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${wr}%; background:${getPColor(p)}"></div></div></div>`;
        });
        container.appendChild(card);
    });
}

window.toggleMainSection = (id) => document.getElementById(id).classList.toggle('collapsed');
window.editMatch = (date, mid) => {
    const m = allData[date][mid]; editingId = mid;
    document.getElementById('date').value = date; document.getElementById('loc').value = m.location;
    document.getElementById('table').value = m.table; document.getElementById('playerInputs').innerHTML = "";
    m.players.forEach(p => window.addPlayerField(p.name, p.score));
    document.getElementById('btnSave').innerText = "Update Match"; window.scrollTo({top: 0, behavior: 'smooth'});
};
window.delMatch = (date, mid) => { if(confirm("Delete match?")) remove(ref(db, `${DB_PATH}/${date}/${mid}`)); };
window.toggleTheme = () => {
  const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', next); localStorage.setItem('billiard-theme', next);
};

document.getElementById('date').value = new Date().toISOString().split('T')[0];
if(localStorage.getItem('billiard-theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
addPlayerField(); addPlayerField();
document.addEventListener('click', (e) => { if(!e.target.classList.contains('p-name')) document.querySelectorAll('.ac-box').forEach(b => b.style.display='none'); });
</script>
</body>
</html>
