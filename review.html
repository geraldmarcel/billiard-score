<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Pro Tracker V9.8</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b;
    --border: #d2d2d7; --primary: #0071e3; --accent: #f5f5f7;
    --win: #0071e3; --lose: #ff3b30;
  }
  [data-theme="dark"] {
    --bg: #000000; --card: #1c1c1e; --text: #f5f5f7; --sub: #a1a1a6;
    --border: #38383a; --primary: #0a84ff; --accent: #2c2c2e;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
  .container { max-width: 800px; margin: 0 auto; }
  
  .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn { text-decoration: none; color: var(--sub); font-size: 13px; font-weight: 600; }
  .mode-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600; }

  /* Input Cards */
  .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); position: relative; }
  .input-group { display: flex; flex-direction: column; position: relative; margin-bottom: 12px; }
  
  /* Compact Date Style */
  .date-wrap { width: 150px; } 
  
  label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--sub); margin-bottom: 5px; letter-spacing: 0.5px; }
  input, select { background: var(--accent); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }
  
  /* Buttons Layout (Save Left, Reset Right) */
  .btn-container { display: flex; gap: 10px; margin-top: 15px; }
  .save-btn { flex: 3; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px; }
  .reset-btn { flex: 1; padding: 15px; background: var(--accent); color: var(--sub); border: 1px solid var(--border); border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 13px; }
  
  /* Player UI */
  .player-header { display: flex; gap: 10px; margin-bottom: 5px; }
  .player-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .p-name-wrap { flex: 1; position: relative; }
  .p-score-wrap { width: 70px; }
  .p-score { text-align: center; font-weight: 800; color: var(--primary); }

  /* Autocomplete */
  .ac-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; z-index: 9999; display: none; max-height: 150px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .ac-item { padding: 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
  .ac-item:hover { background: var(--primary); color: white; }

  /* Table Styles */
  .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 450px; }
  th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: var(--accent); color: var(--sub); font-size: 9px; font-weight: 800; text-transform: uppercase; }
  
  /* Action Buttons in Table */
  .action-btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; margin: 2px; }
  .edit { background: #e1f0ff; color: var(--primary); }
  .delete { background: #ffebeb; color: #ff3b30; }

  .tag { padding: 4px 8px; border-radius: 6px; color: #fff; font-size: 10px; font-weight: 800; margin: 1px; display: inline-block; }
  .blue { background: var(--win); } .red { background: var(--lose); }

  .collapsed { display: none !important; }
  .section-title { font-size: 14px; font-weight: 800; margin: 25px 0 12px; display: flex; justify-content: space-between; cursor: pointer; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
  .chart-container { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 10px; margin-top: 10px; height: 220px; display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div class="container">
  <div class="nav-top">
    <a href="index.html" class="back-btn">← Back to Home</a>
    <button class="mode-btn" onclick="toggleTheme()">🌓 Theme</button>
  </div>

  <div class="card">
    <div style="font-weight: 800; font-size: 15px; margin-bottom: 15px;">📝 Match Record</div>
    <div class="input-group date-wrap"><label>Match Date</label><input type="date" id="date"></div>
    <div style="display:flex; gap:10px;">
      <div class="input-group" style="flex:2;"><label>Location</label><input type="text" id="loc" placeholder="Club..." autocomplete="off"><div id="res-loc" class="ac-box"></div></div>
      <div class="input-group" style="flex:1;"><label>Table</label><input type="text" id="table" placeholder="No..." autocomplete="off"><div id="res-table" class="ac-box"></div></div>
    </div>
    <div id="playerInputs"></div>
    <button style="background:none; border: 1px dashed var(--sub); color: var(--sub); padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin: 10px 0; font-size: 12px;" onclick="window.addPlayerField()">+ Add Player</button>
    <div class="btn-container">
      <button class="save-btn" id="btnSave" onclick="saveMatch()">Save Match Result</button>
      <button class="reset-btn" onclick="window.resetForm()">Reset</button>
    </div>
  </div>

  <div class="section-title" onclick="toggleMainSection('h2hSection')">🏆 H2H Analysis <span>▼</span></div>
  <div id="h2hSection">
    <div class="table-wrapper"><table><thead><tr><th>Matchup</th><th>Points</th></tr></thead><tbody id="leaderboardBody"></tbody></table></div>
    <div class="chart-container"><canvas id="leaderboardChart"></canvas></div>
  </div>

  <div style="font-size: 14px; font-weight: 800; margin: 25px 0 12px; color: var(--sub);">📜 Match History</div>
  <div class="table-wrapper">
    <table><thead><tr><th>Date</th><th>Result</th><th>Loc</th><th>Tab</th><th>Act</th></tr></thead><tbody id="historyBody"></tbody></table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtlTm-HxYxa4f_Ypf-b-cs7zCnqWb5Tq4",
  authDomain: "billiard-2b803.firebaseapp.com",
  databaseURL: "https://billiard-2b803-default-rtdb.firebaseio.com",
  projectId: "billiard-2b803",
  storageBucket: "billiard-2b803.firebasestorage.app",
  messagingSenderId: "444434542940",
  appId: "1:444434542940:web:74b12f78ea71bd54f3d199"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'billiard_final_v8';

let allData = {}, masterP = [], masterL = [], masterT = [], selectedPlayers = [];
let editingId = null, myChart = null;

const userColors = ["#0071e3", "#34c759", "#ff9500", "#af52de", "#ff3b30", "#5856d6", "#ff2d55", "#00c7be"];
function getPColor(p) { return userColors[masterP.indexOf(p) % userColors.length]; }

window.addPlayerField = (n="", s="") => {
    const cont = document.getElementById('playerInputs');
    const div = document.createElement('div'); div.className = 'player-row';
    div.innerHTML = `<div class="p-name-wrap"><input type="text" class="p-name" placeholder="Name..." value="${n}"><div class="ac-box"></div></div><div class="p-score-wrap"><input type="number" class="p-score" value="${s}"></div>`;
    cont.appendChild(div);
};

window.resetForm = () => {
    editingId = null;
    document.getElementById('btnSave').innerText = "Save Match Result";
    document.getElementById('loc').value = ""; document.getElementById('table').value = "";
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('playerInputs').innerHTML = "";
    addPlayerField(); addPlayerField();
};

onValue(ref(db, DB_PATH), snap => {
    allData = snap.val() || {};
    render();
});

window.saveMatch = () => {
    const d = document.getElementById('date').value, l = document.getElementById('loc').value.trim() || "-", t = document.getElementById('table').value.trim() || "-";
    const ns = document.querySelectorAll('.p-name'), scs = document.querySelectorAll('.p-score');
    let ps = []; ns.forEach((el, i) => { if(el.value.trim()) ps.push({ name: el.value.trim(), score: parseInt(scs[i].value) || 0 }); });
    if(ps.length < 2 || !d) return alert("Complete data!");
    const path = editingId ? `${DB_PATH}/${d}/${editingId}` : `${DB_PATH}/${d}`;
    (editingId ? set(ref(db, path), { players:ps, location:l, table:t, timestamp:Date.now() }) : push(ref(db, path), { players:ps, location:l, table:t, timestamp:Date.now() }))
    .then(() => window.resetForm());
};

window.render = () => {
    const hBody = document.getElementById('historyBody'); hBody.innerHTML = "";
    Object.keys(allData).sort().reverse().forEach(date => {
        Object.keys(allData[date]).forEach(mid => {
            const m = allData[date][mid], hi = Math.max(...m.players.map(p => p.score));
            const tr = document.createElement('tr');
            let res = m.players.map(p => `<span class="tag ${p.score==hi?'blue':'red'}">${p.name.split(' ')[0]}</span>`).join("");
            tr.innerHTML = `<td>${date.slice(5)}</td><td>${res}</td><td>${m.location}</td><td>${m.table}</td>
                <td>
                  <button class="action-btn edit" onclick="window.editMatch('${date}','${mid}')">✎</button>
                  <button class="action-btn delete" onclick="window.delMatch('${date}','${mid}')">✕</button>
                </td>`;
            hBody.appendChild(tr);
        });
    });
};

window.editMatch = (d, mid) => {
    const m = allData[d][mid]; editingId = mid;
    document.getElementById('date').value = d; document.getElementById('loc').value = m.location;
    document.getElementById('table').value = m.table; document.getElementById('playerInputs').innerHTML = "";
    m.players.forEach(p => window.addPlayerField(p.name, p.score));
    document.getElementById('btnSave').innerText = "Update Match"; window.scrollTo(0,0);
};

window.delMatch = (d, mid) => { if(confirm("Hapus data ini?")) remove(ref(db, `${DB_PATH}/${d}/${mid}`)); };

window.toggleMainSection = (id) => document.getElementById(id).classList.toggle('collapsed');
window.toggleTheme = () => {
    const n = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', n);
};

document.getElementById('date').value = new Date().toISOString().split('T')[0];
addPlayerField(); addPlayerField();
</script>
</body>
</html>
